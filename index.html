
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#0f2744;--navy2:#1a3a5c;--navy3:#2d5282;
  --green:#1a4731;--green2:#276749;
  --amber:#92400e;--amber-bg:#fffbeb;--amber-border:#f59e0b;
  --red:#991b1b;--red-bg:#fff5f5;
  --slate:#64748b;--slate-light:#f1f5f9;
  --border:#e2e8f0;--border2:#cbd5e1;
  --faculty-bg:#eef4ff;--faculty-stripe:#1e40af;
  --tut-bg:#f0fdf4;--tut-stripe:#15803d;
  --holiday-bg:#fffbeb;--holiday-stripe:#d97706;
  --sunday-bg:#fef2f2;--sunday-stripe:#dc2626;
  --nosess-bg:#fafafa;--nosess-stripe:#d1d5db;
  --radius:10px;
}
body{font-family:'DM Sans',system-ui,sans-serif;background:transparent;color:#1e293b}

#app{max-width:960px;margin:0 auto;padding:1.5rem 1rem}

/* ── UPLOAD ZONE ── */
.hero{text-align:center;padding:0.5rem 0 1.5rem}
.hero-icon{font-size:2.8rem;line-height:1;margin-bottom:0.6rem}
.hero h1{font-size:1.45rem;font-weight:600;color:#0f172a;letter-spacing:-0.025em}
.hero p{font-size:0.83rem;color:#64748b;margin-top:0.3rem}

.drop-area{
  border:2px dashed #94a3b8;border-radius:16px;padding:2.5rem 1.5rem;
  text-align:center;cursor:pointer;transition:all 0.2s;
  background:linear-gradient(135deg,#f8faff 0%,#f0f4ff 100%);
  position:relative;overflow:hidden
}
.drop-area::before{
  content:'';position:absolute;inset:0;
  background:repeating-linear-gradient(45deg,transparent,transparent 10px,rgba(148,163,184,0.04) 10px,rgba(148,163,184,0.04) 20px);
  pointer-events:none
}
.drop-area:hover,.drop-area.drag{border-color:#6366f1;background:linear-gradient(135deg,#f0f0ff 0%,#e8e8ff 100%)}
.drop-area input{position:absolute;inset:0;opacity:0;cursor:pointer;z-index:2}
.drop-icon{font-size:2.2rem;margin-bottom:0.6rem;display:block}
.drop-area h3{font-size:0.95rem;font-weight:600;color:#334155;margin-bottom:0.3rem}
.drop-area p{font-size:0.78rem;color:#94a3b8}

.file-pill{
  display:inline-flex;align-items:center;gap:0.5rem;
  background:#eff6ff;border:1px solid #bfdbfe;color:#1d4ed8;
  border-radius:99px;padding:0.4rem 0.9rem;font-size:0.8rem;font-weight:500;
  margin-top:0.85rem
}

.btn{
  display:inline-flex;align-items:center;gap:0.45rem;
  padding:0.6rem 1.4rem;border-radius:8px;font-size:0.875rem;font-weight:500;
  border:none;cursor:pointer;transition:all 0.15s;font-family:inherit;
  letter-spacing:-0.01em
}
.btn-primary{background:#0f2744;color:#fff}
.btn-primary:hover{background:#1e3a5f;transform:translateY(-1px)}
.btn-primary:disabled{background:#94a3b8;cursor:not-allowed;transform:none}
.btn-export{background:#166534;color:#fff}
.btn-export:hover{background:#14532d;transform:translateY(-1px)}
.btn-ghost{background:transparent;color:#475569;border:1px solid #e2e8f0}
.btn-ghost:hover{background:#f8fafc}
.btn-row{display:flex;gap:0.6rem;justify-content:center;margin-top:1rem;flex-wrap:wrap}

.status{
  display:flex;align-items:center;gap:0.6rem;
  background:#f0f9ff;border:1px solid #bae6fd;border-radius:8px;
  padding:0.65rem 1rem;margin-top:0.85rem;font-size:0.82rem;color:#0369a1
}
.status.err{background:#fff1f2;border-color:#fecdd3;color:#be123c}
.spin{width:15px;height:15px;border:2px solid #bae6fd;border-top-color:#0369a1;border-radius:50%;animation:spin 0.75s linear infinite;flex-shrink:0}
.spin.hide{display:none}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── CALENDAR OUTPUT ── */
#cal-wrap{margin-top:2rem}

.cal-masthead{
  background:var(--navy);border-radius:14px 14px 0 0;
  padding:1.75rem 2rem;color:#fff;position:relative;overflow:hidden
}
.cal-masthead::after{
  content:'';position:absolute;right:-40px;top:-40px;
  width:220px;height:220px;border-radius:50%;
  background:rgba(255,255,255,0.04);pointer-events:none
}
.cal-masthead h2{font-size:1.25rem;font-weight:600;letter-spacing:-0.02em;max-width:70%}
.cal-masthead .sub{font-size:0.78rem;opacity:0.6;margin-top:0.2rem}
.cal-stats{display:flex;gap:2rem;margin-top:1.25rem;flex-wrap:wrap}
.stat-item{display:flex;flex-direction:column;gap:0.15rem}
.stat-val{font-size:1.35rem;font-weight:600;line-height:1}
.stat-lbl{font-size:0.7rem;opacity:0.55;text-transform:uppercase;letter-spacing:0.05em}

.legend-bar{
  display:flex;flex-wrap:wrap;gap:0.9rem;align-items:center;
  padding:0.75rem 1.75rem;background:#f8fafc;
  border:1px solid var(--border);border-top:none
}
.leg{display:flex;align-items:center;gap:0.4rem;font-size:0.73rem;color:#475569;font-weight:500}
.leg-dot{width:10px;height:10px;border-radius:2px;flex-shrink:0}

.cal-body{border:1px solid var(--border);border-top:none;border-radius:0 0 14px 14px;overflow:hidden}

/* Month separator */
.month-sep{
  background:#e2e8f0;padding:0.35rem 1.5rem;
  font-size:0.7rem;font-weight:600;color:#475569;
  text-transform:uppercase;letter-spacing:0.08em;
  border-bottom:1px solid var(--border)
}

/* Week group */
.week-block{border-bottom:1.5px solid var(--border2)}
.week-block:last-child{border-bottom:none}
.week-hdr{
  display:grid;grid-template-columns:auto 1fr;align-items:center;
  background:#f1f5f9;padding:0.3rem 1.5rem;gap:0.75rem;
  border-bottom:1px solid var(--border)
}
.week-num{font-size:0.65rem;font-weight:700;color:#94a3b8;text-transform:uppercase;letter-spacing:0.07em;white-space:nowrap}
.week-dates{font-size:0.7rem;color:#94a3b8}

/* Day row */
.d-row{
  display:grid;
  grid-template-columns:88px 70px 1fr;
  border-bottom:0.5px solid var(--border);
  min-height:44px;
  position:relative
}
.d-row:last-child{border-bottom:none}
.d-row.faculty{background:var(--faculty-bg)}
.d-row.tutorial{background:var(--tut-bg)}
.d-row.holiday{background:var(--holiday-bg)}
.d-row.sunday{background:var(--sunday-bg)}
.d-row.no_session{background:var(--nosess-bg)}

/* left stripe */
.d-row::before{
  content:'';position:absolute;left:0;top:0;bottom:0;width:3px;
}
.d-row.faculty::before{background:var(--faculty-stripe)}
.d-row.tutorial::before{background:var(--tut-stripe)}
.d-row.holiday::before{background:var(--holiday-stripe)}
.d-row.sunday::before{background:var(--sunday-stripe)}
.d-row.no_session::before{background:var(--nosess-stripe)}

.d-date{
  padding:0.55rem 0.6rem 0.55rem 1.1rem;
  display:flex;flex-direction:column;justify-content:center;
  border-right:1px solid var(--border)
}
.d-day-num{font-size:0.95rem;font-weight:600;color:#1e293b;line-height:1}
.d-month{font-size:0.62rem;color:#94a3b8;text-transform:uppercase;letter-spacing:0.04em}
.d-weekday{font-size:0.62rem;color:#94a3b8;margin-top:0.1rem}

.d-type{
  display:flex;align-items:center;justify-content:center;
  padding:0.4rem 0.5rem;border-right:1px solid var(--border)
}
.type-badge{
  font-size:0.6rem;font-weight:700;letter-spacing:0.04em;
  text-transform:uppercase;padding:0.22rem 0.45rem;
  border-radius:4px;text-align:center;line-height:1.4
}
.badge-faculty{background:#dbeafe;color:#1e40af}
.badge-tutorial{background:#dcfce7;color:#15803d}
.badge-holiday{background:#fef3c7;color:#d97706}
.badge-sunday{background:#fee2e2;color:#dc2626}
.badge-reserved{background:#f3f4f6;color:#6b7280}
.badge-no{color:#cbd5e1;font-size:0.6rem}

.d-content{
  padding:0.55rem 1rem;display:flex;align-items:center;
  font-size:0.78rem;line-height:1.4;gap:0.5rem
}
.d-content.faculty{color:#1e3a8a;font-weight:500}
.d-content.tutorial{color:#166534}
.d-content.holiday{color:#92400e;font-style:italic}
.d-content.sunday{color:#dc2626;font-size:0.72rem;font-style:italic}
.d-content.no_session{color:#cbd5e1;font-size:0.72rem}
.d-content.reserved{color:#9ca3af;font-style:italic;font-size:0.72rem}
.d-faculty-name{font-size:0.68rem;color:#6b7280;margin-left:auto;flex-shrink:0;font-weight:400}
.d-time{font-family:'DM Mono',monospace;font-size:0.65rem;color:#94a3b8;flex-shrink:0;margin-left:auto}

/* module tag */
.mod-tag{
  font-size:0.6rem;font-weight:700;background:#e0e7ff;color:#4338ca;
  padding:0.12rem 0.35rem;border-radius:3px;flex-shrink:0;white-space:nowrap
}

@media(max-width:600px){
  .d-row{grid-template-columns:72px 60px 1fr}
  .cal-masthead{padding:1.2rem}
  .cal-stats{gap:1.2rem}
  .d-content{padding:0.5rem 0.6rem;font-size:0.73rem}
  .d-faculty-name{display:none}
}
</style>
</head>
<body>
<div id="app">

<div id="upload-ui">
  <div class="hero">
    <div class="hero-icon">🗓</div>
    <h1>Universal Programme Calendar</h1>
    <p>Upload any schedule PDF — any format — and get a beautiful calendar</p>
  </div>

  <div class="drop-area" id="drop">
    <input type="file" id="fi" accept=".pdf,.xlsx,.csv,.docx,.txt">
    <span class="drop-icon">📎</span>
    <h3>Drop your schedule file here</h3>
    <p>PDF, Excel, CSV, Word, or plain text · Any format works</p>
  </div>

  <div id="fpill" style="text-align:center;display:none">
    <div class="file-pill">📄 <span id="fname"></span></div>
  </div>

  <div class="btn-row">
    <button class="btn btn-primary" id="gen-btn" disabled onclick="go()">✨ Generate Calendar</button>
  </div>

  <div id="stat" style="display:none" class="status">
    <div class="spin" id="spin"></div>
    <span id="stat-text">Working…</span>
  </div>
</div>

<div id="cal-wrap" style="display:none">
  <div id="cal-out"></div>
  <div class="btn-row" style="margin-top:1.25rem">
    <button class="btn btn-export" onclick="doPrint()">⬇ Download PDF</button>
    <button class="btn btn-ghost" onclick="reset()">↑ Upload another file</button>
  </div>
</div>

</div>

<style>
@media print{
  #upload-ui,.btn-row{display:none!important}
  #cal-wrap{display:block!important}
  .cal-masthead,.d-row,.legend-bar,.week-hdr,.month-sep{-webkit-print-color-adjust:exact;print-color-adjust:exact}
  .d-row::before{-webkit-print-color-adjust:exact;print-color-adjust:exact}
  body{background:#fff}
  #app{padding:0}
}
</style>

<script>
let selFile=null;

const drop=document.getElementById('drop');
const fi=document.getElementById('fi');
const fpill=document.getElementById('fpill');
const fname=document.getElementById('fname');
const genBtn=document.getElementById('gen-btn');
const statDiv=document.getElementById('stat');
const statText=document.getElementById('stat-text');
const spin=document.getElementById('spin');
const calWrap=document.getElementById('cal-wrap');
const calOut=document.getElementById('cal-out');
const uploadUI=document.getElementById('upload-ui');

fi.onchange=e=>{if(e.target.files[0])pick(e.target.files[0])};
drop.addEventListener('dragover',e=>{e.preventDefault();drop.classList.add('drag')});
drop.addEventListener('dragleave',()=>drop.classList.remove('drag'));
drop.addEventListener('drop',e=>{e.preventDefault();drop.classList.remove('drag');if(e.dataTransfer.files[0])pick(e.dataTransfer.files[0])});

function pick(f){selFile=f;fname.textContent=f.name;fpill.style.display='block';genBtn.disabled=false}

function setStatus(msg,err=false,loading=true){
  statDiv.style.display='flex';
  statDiv.className='status'+(err?' err':'');
  statText.textContent=msg;
  spin.className='spin'+(loading?'':' hide');
}
function hideStatus(){statDiv.style.display='none'}

async function toBase64(f){
  return new Promise((res,rej)=>{
    const r=new FileReader();
    r.onload=()=>res(r.result.split(',')[1]);
    r.onerror=()=>rej(new Error('Read failed'));
    r.readAsDataURL(f);
  });
}

async function go(){
  if(!selFile)return;
  genBtn.disabled=true;
  setStatus('Reading your file…');

  try{
    const b64=await toBase64(selFile);
    const ext=selFile.name.split('.').pop().toLowerCase();

    setStatus('AI is parsing the schedule — this may take 20–30 seconds…');

    const sys=`You are an expert schedule/calendar data extractor. The user will upload a file (PDF, spreadsheet, Word doc, or text) containing a programme schedule or academic calendar. Your job is to extract EVERY single day/session entry from it, regardless of format.

The file might be:
- A structured PDF table with columns
- A freeform list of dates and topics
- An Excel/CSV export
- A messy mix of formats

Extract ALL entries and return ONLY a valid JSON object — no markdown, no explanation:

{
  "title": "Full programme title",
  "subtitle": "e.g. IIM Ranchi / institution name if present",
  "directors": "faculty/director names if present, else empty string",
  "totalStudents": number or 0,
  "sessions": [
    {
      "date": "YYYY-MM-DD",
      "dayName": "Monday",
      "weekNo": 1,
      "sessionType": "faculty|tutorial|no_session|sunday|holiday|reserved|project",
      "title": "Full topic/title text, can be multi-sentence. Empty string if none.",
      "startTime": "HH:MM or empty",
      "endTime": "HH:MM or empty",
      "durationHours": number or 0,
      "faculty": "Faculty name(s) or empty",
      "module": "Module number/name or empty",
      "notes": "Any extra notes or empty"
    }
  ]
}

Session type rules:
- "faculty" = main lecture / Faculty Session / teaching session
- "tutorial" = Tutorial, Doubt Session, Q&A session
- "no_session" = weekday with nothing scheduled
- "sunday" = Sunday (even if nothing noted)
- "holiday" = public holiday, national holiday
- "reserved" = reserved / buffer / TBD slots
- "project" = project presentation, project work sessions

CRITICAL RULES:
1. Include EVERY day in the date range, even "No session" days
2. Infer dayName from the date if not given
3. Infer weekNo sequentially if not explicitly stated
4. If a row spans multiple topics, put them all in "title" separated by " | "
5. Do not skip any row. Missing = no_session or sunday
6. Return ONLY JSON. No markdown code fences. No preamble.`;

    const msgContent=[];

    if(ext==='pdf'){
      msgContent.push({type:'document',source:{type:'base64',media_type:'application/pdf',data:b64}});
    } else if(['png','jpg','jpeg','webp','gif'].includes(ext)){
      msgContent.push({type:'image',source:{type:'base64',media_type:'image/'+ext,data:b64}});
    } else {
      // For excel/csv/word/txt, try sending as text decoded
      try{
        const txt=atob(b64);
        msgContent.push({type:'text',text:'FILE CONTENTS:\n'+txt.substring(0,50000)});
      } catch(e){
        msgContent.push({type:'document',source:{type:'base64',media_type:'application/pdf',data:b64}});
      }
    }

    msgContent.push({type:'text',text:'Extract all calendar/schedule data from this file and return as JSON.'});

    const resp=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'claude-sonnet-4-20250514',
        max_tokens:8000,
        system:sys,
        messages:[{role:'user',content:msgContent}]
      })
    });

    if(!resp.ok){const e=await resp.text();throw new Error('API '+resp.status+': '+e.substring(0,200))}

    const data=await resp.json();
    const raw=data.content.map(i=>i.text||'').join('');

    setStatus('Rendering your calendar…');

    // Robust JSON extraction
    let json=raw.trim();
    // Strip markdown fences if present
    json=json.replace(/^```[a-z]*\n?/,'').replace(/\n?```$/,'').trim();
    // Find first { and last }
    const start=json.indexOf('{');
    const end=json.lastIndexOf('}');
    if(start!==-1&&end!==-1)json=json.slice(start,end+1);

    const cal=JSON.parse(json);
    renderCal(cal);

    hideStatus();
    uploadUI.style.display='none';
    calWrap.style.display='block';

  }catch(err){
    setStatus('Error: '+err.message,true,false);
    genBtn.disabled=false;
  }
}

function renderCal(cal){
  const sessions=cal.sessions||[];
  
  // Stats
  const fCount=sessions.filter(s=>s.sessionType==='faculty').length;
  const tCount=sessions.filter(s=>s.sessionType==='tutorial').length;
  const pCount=sessions.filter(s=>s.sessionType==='project').length;
  const totalH=sessions.reduce((a,s)=>a+(parseFloat(s.durationHours)||
    (s.sessionType==='faculty'?3:s.sessionType==='tutorial'?1.5:0)),0);

  // Group by month then week
  const byMonth={};
  sessions.forEach(s=>{
    if(!s.date)return;
    const d=new Date(s.date+'T00:00:00');
    if(isNaN(d))return;
    const mk=d.getFullYear()+'-'+(d.getMonth()+1).toString().padStart(2,'0');
    const wk=s.weekNo||0;
    if(!byMonth[mk])byMonth[mk]={label:d.toLocaleDateString('en-IN',{month:'long',year:'numeric'}),weeks:{}};
    if(!byMonth[mk].weeks[wk])byMonth[mk].weeks[wk]={sessions:[]};
    byMonth[mk].weeks[wk].sessions.push(s);
  });

  const months=Object.keys(byMonth).sort();

  let html=`
  <div id="printable">
  <div class="cal-masthead">
    <h2>${esc(cal.title||'Programme Calendar')}</h2>
    ${cal.subtitle?`<div class="sub">${esc(cal.subtitle)}</div>`:''}
    ${cal.directors?`<div class="sub" style="margin-top:0.15rem">Directors: ${esc(cal.directors)}</div>`:''}
    <div class="cal-stats">
      <div class="stat-item"><span class="stat-val">${fCount}</span><span class="stat-lbl">Faculty sessions</span></div>
      <div class="stat-item"><span class="stat-val">${tCount}</span><span class="stat-lbl">Tutorials</span></div>
      ${pCount?`<div class="stat-item"><span class="stat-val">${pCount}</span><span class="stat-lbl">Project sessions</span></div>`:''}
      <div class="stat-item"><span class="stat-val">${Math.round(totalH)}h</span><span class="stat-lbl">Total hours</span></div>
      ${cal.totalStudents?`<div class="stat-item"><span class="stat-val">${cal.totalStudents}</span><span class="stat-lbl">Students</span></div>`:''}
    </div>
  </div>
  <div class="legend-bar">
    <div class="leg"><div class="leg-dot" style="background:#1e40af"></div>Faculty session</div>
    <div class="leg"><div class="leg-dot" style="background:#15803d"></div>Tutorial</div>
    <div class="leg"><div class="leg-dot" style="background:#d97706"></div>Holiday</div>
    <div class="leg"><div class="leg-dot" style="background:#dc2626"></div>Sunday</div>
    <div class="leg"><div class="leg-dot" style="background:#6366f1"></div>Project</div>
    <div class="leg"><div class="leg-dot" style="background:#9ca3af"></div>Reserved / No session</div>
  </div>
  <div class="cal-body">`;

  months.forEach(mk=>{
    const mon=byMonth[mk];
    html+=`<div class="month-sep">${esc(mon.label)}</div>`;
    const weeks=Object.keys(mon.weeks).sort((a,b)=>Number(a)-Number(b));
    weeks.forEach(wk=>{
      const ws=mon.weeks[wk].sessions;
      const wStart=ws[0]?.date;const wEnd=ws[ws.length-1]?.date;
      const wLabel=Number(wk)>0?`Week ${wk}`:'';
      const wRange=wStart&&wEnd?`${fmtShort(wStart)} – ${fmtShort(wEnd)}`:'';
      html+=`<div class="week-block">
        ${wLabel?`<div class="week-hdr"><span class="week-num">${esc(wLabel)}</span><span class="week-dates">${esc(wRange)}</span></div>`:''}`;

      ws.forEach(s=>{
        const st=s.sessionType||'no_session';
        const isPrj=st==='project';
        const cls=isPrj?'faculty':st; // project uses faculty color class
        
        // Badge
        let badge='';
        if(st==='faculty') badge=`<span class="type-badge badge-faculty">Faculty</span>`;
        else if(st==='tutorial') badge=`<span class="type-badge badge-tutorial">Tutorial</span>`;
        else if(st==='holiday') badge=`<span class="type-badge badge-holiday">Holiday</span>`;
        else if(st==='sunday') badge=`<span class="type-badge badge-sunday">Sunday</span>`;
        else if(st==='reserved') badge=`<span class="type-badge badge-reserved">Reserved</span>`;
        else if(isPrj) badge=`<span class="type-badge" style="background:#ede9fe;color:#6d28d9">Project</span>`;
        else badge=`<span class="badge-no">—</span>`;

        // Content
        let contentCls=cls;
        if(isPrj)contentCls='faculty';
        let body='';
        const title=esc(s.title||'');

        if(st==='faculty'||isPrj){
          body=`${title||'Session'}`;
        } else if(st==='tutorial'){
          body=title||'Doubt / Tutorial Session';
        } else if(st==='holiday'){
          body=title||'Public Holiday';
        } else if(st==='sunday'){
          body='Sunday';
        } else if(st==='reserved'){
          body=title||'Reserved / Buffer';
        } else {
          body='No session';
        }

        const time=(s.startTime&&s.endTime)?`${s.startTime}–${s.endTime}`:'';
        const mod=s.module?`<span class="mod-tag">M${esc(s.module)}</span>`:'';
        const fac=s.faculty?`<span class="d-faculty-name">${esc(s.faculty)}</span>`:'';
        const timeTag=time?`<span class="d-time">${esc(time)}</span>`:'';

        // Parse date display
        const dateObj=s.date?new Date(s.date+'T00:00:00'):null;
        const dayNum=dateObj?dateObj.getDate():'';
        const monthAbbr=dateObj?dateObj.toLocaleDateString('en-IN',{month:'short'}):'';
        const dayOfWeek=s.dayName||(dateObj?dateObj.toLocaleDateString('en-IN',{weekday:'short'}):'');

        html+=`
        <div class="d-row ${cls}">
          <div class="d-date">
            <div class="d-day-num">${dayNum}</div>
            <div class="d-month">${esc(monthAbbr)}</div>
            <div class="d-weekday">${esc(dayOfWeek)}</div>
          </div>
          <div class="d-type">${badge}</div>
          <div class="d-content ${contentCls}">
            ${mod}${body}${fac}${timeTag}
          </div>
        </div>`;
      });

      html+=`</div>`;
    });
  });

  html+=`</div></div></div>`;
  calOut.innerHTML=html;
}

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

function fmtShort(d){
  if(!d)return'';
  try{
    const dt=new Date(d+'T00:00:00');
    return dt.toLocaleDateString('en-IN',{day:'numeric',month:'short'});
  }catch{return d}
}

function doPrint(){window.print()}

function reset(){
  selFile=null;fi.value='';
  fpill.style.display='none';genBtn.disabled=true;
  calWrap.style.display='none';calOut.innerHTML='';
  uploadUI.style.display='block';hideStatus();
}
</script>
</body>
</html>
